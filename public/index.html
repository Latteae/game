<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Record of taking Notes</title>
    <style>
        :root { --bg: #f5f6fa; --text: #2f3640; --box: #ffffff; --border: #dcdde1; --accent: #27ae60; --danger: #e74c3c; }
        body.dark-mode { --bg: #1e272e; --text: #d2dae2; --box: #2f3640; --border: #485460; --accent: #44bd32; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; transition: 0.3s; overflow: hidden; }

        #leaderboard { width: 300px; background: var(--box); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; display: none; }
        #main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .nav { width: 100%; height: 60px; background: var(--box); display: none; justify-content: center; align-items: center; border-bottom: 1px solid var(--border); z-index: 100; position: relative; }
        .tab-btn { background: none; border: none; padding: 18px 20px; cursor: pointer; color: var(--text); font-weight: bold; border-bottom: 4px solid transparent; height: 100%; box-sizing: border-box; }
        .tab-btn.active { border-bottom-color: var(--accent); color: var(--accent); }

        .box { background: var(--box); padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 350px; margin-top: 50px; }
        input, select, textarea { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #notes-container { width: 90%; max-width: 800px; margin-top: 20px; overflow-y: auto; flex-grow: 1; padding-bottom: 50px; }
        
        /* Note Cards & Truncation */
        .note-card { background: var(--box); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); text-align: left; position: relative; }
        .note-content { white-space: pre-wrap; word-wrap: break-word; max-height: 120px; overflow: hidden; position: relative; transition: 0.3s; }
        .note-content.expanded { max-height: none; }
        .read-more { color: var(--accent); cursor: pointer; font-size: 13px; font-weight: bold; display: block; margin-top: 5px; }

        .del-btn { position: absolute; top: 15px; right: 15px; color: var(--danger); cursor: pointer; font-size: 18px; }

        /* Sidebar Settings */
        .sidebar { position: fixed; right: -350px; top: 60px; width: 300px; height: calc(100% - 60px); background: var(--box); transition: 0.3s; padding: 25px; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 90; border-top: 1px solid var(--border); }
        .sidebar.active { right: 0; }
        .menu-btn { font-size: 24px; background: none; color: var(--text); padding: 0 20px; height: 100%; display: flex; align-items: center; cursor: pointer; }

        .lb-checkbox-container { display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 15px; border-radius: 10px; margin: 10px 0; cursor: pointer; border: 2px solid var(--accent); font-size: 18px; font-weight: bold; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 200; }
    </style>
</head>
<body>

    <div id="leaderboard">
        <h3 style="color: var(--accent)">🏆 Leaderboard</h3>
        <div id="rank-list"></div>
    </div>

    <div id="main">
        <div class="nav" id="game-nav">
            <button id="tab-global" class="tab-btn active" onclick="setTab('global')">Notes</button>
            <button id="tab-user" class="tab-btn" onclick="setTab('user')">Your Notes</button>
            <div style="position: absolute; right: 0; height: 100%; display: flex; align-items: center;">
                <button onclick="toggleTheme()" style="background:#f39c12; margin-right: 5px;">🌓</button>
                <button onclick="openModal('note-modal')" style="background:#2980b9; margin-right: 5px;">📝 เขียนโน๊ต</button>
                <div class="menu-btn" onclick="toggleSide()">☰</div>
            </div>
        </div>

        <div id="auth-section">
            <div id="login-box" class="box">
                <h2>Record of taking Notes</h2>
                <input type="text" id="user-in" placeholder="Username">
                <input type="password" id="pass-in" placeholder="Password">
                <button onclick="handleAuth('signin')">Sign In</button>
                <p onclick="toggleAuth('signup')" style="cursor:pointer; font-size:12px">ยังไม่มีบัญชี? สมัครที่นี่</p>
            </div>
            <div id="reg-box" class="box" style="display:none">
                <h2>Create Account</h2>
                <input type="text" id="user-up" placeholder="Username">
                <input type="password" id="pass-up" placeholder="Password">
                <select id="country-up"></select>
                <button onclick="handleAuth('signup')">Sign Up</button>
                <p onclick="toggleAuth('login')" style="cursor:pointer; font-size:12px">มีบัญชีแล้ว? ล็อกอิน</p>
            </div>
        </div>

        <div id="game-section" style="display:none; width: 100%; flex-direction: column; align-items: center; height: 100%;">
            <div id="stats" style="margin-top: 20px; font-size: 18px; font-weight: bold;">
                Lv. <span id="lvl-txt">1</span> | EXP: <span id="exp-txt">0</span> / <span id="cap-txt">50</span> | 📝 <span id="note-txt">0</span>
            </div>
            <div id="notes-container"></div>
        </div>
    </div>

    <div id="side" class="sidebar">
        <label class="lb-checkbox-container"><input type="checkbox" id="show-lb" onchange="toggleLB()"> แสดงอันดับ</label>
        <hr>
        <h4>Edit Profile</h4>
        <input type="text" id="edit-user"><input type="password" id="edit-pass"><select id="edit-country"></select>
        <button onclick="updateProfile()" style="width:100%; margin-top:10px">Save Changes</button>
        <hr>
        <button onclick="logout()" style="background:var(--danger); width:100%">Log Out</button>
    </div>

    <div id="note-modal" class="modal">
        <div class="box" style="width: 500px;">
            <h3>New Note</h3>
            <textarea id="note-input" rows="8"></textarea>
            <button onclick="submitNote()">บันทึก</button>
            <button onclick="closeModal('note-modal')" style="background:var(--danger)">ปิด</button>
        </div>
    </div>

    <div id="confirm-modal" class="modal">
        <div class="box">
            <h3>ยืนยันการลบ?</h3>
            <p>โน๊ตนี้จะถูกลบถาวร ไม่สามารถกู้คืนได้</p>
            <button id="confirm-del-btn" style="background:var(--danger)">ลบเลย</button>
            <button onclick="closeModal('confirm-modal')">ยกเลิก</button>
        </div>
    </div>

    <script>
        let userId = localStorage.getItem('userId'), level = 1, exp = 0, totalNotes = 0, currentTab = 'global';
        const countries = ["Thailand 🇹🇭", "USA 🇺🇸", "Japan 🇯🇵"];

        // 1. Auto Login Check
        window.onload = () => { if(userId) loadGame(); };

        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
        function toggleAuth(p) { 
            document.getElementById('login-box').style.display = p === 'login' ? 'block' : 'none';
            document.getElementById('reg-box').style.display = p === 'signup' ? 'block' : 'none';
        }
        function toggleSide() { document.getElementById('side').classList.toggle('active'); if(document.getElementById('side').classList.contains('active')) loadEditInfo(); }

        function getCap(lvl) {
            let cap = 50;
            for(let i=2; i<=lvl; i++) {
                if(i <= 30) cap *= 1.08; else if(i <= 50) cap *= 1.06; else if(i <= 70) cap *= 1.08; else cap *= 1.04;
            }
            return Math.floor(cap);
        }

        document.getElementById('note-input').addEventListener('keydown', (e) => {
            if (e.key.length === 1 && !e.ctrlKey && !e.altKey && e.key !== ' ') {
                exp++;
                if (exp >= getCap(level)) { exp = 0; level++; }
                updateUI();
            }
        });

        async function handleAuth(type) {
            const u = document.getElementById(type==='signin'?'user-in':'user-up').value;
            const p = document.getElementById(type==='signin'?'pass-in':'pass-up').value;
            const c = type==='signup' ? document.getElementById('country-up').value : '-';
            const res = await fetch(`/api/${type}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username:u, password:p, country:c}) });
            if (res.ok) {
                const data = await res.json();
                if(type==='signin') { userId = data.userId; localStorage.setItem('userId', userId); loadGame(); }
                else { alert("สมัครสำเร็จ!"); toggleAuth('login'); }
            } else alert("ข้อมูลไม่ถูกต้อง");
        }

        async function loadGame() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('game-nav').style.display = 'flex';
            document.getElementById('game-section').style.display = 'flex';
            const res = await fetch(`/api/load/${userId}`);
            const data = await res.json();
            level = data.level; exp = data.exp; totalNotes = data.total_notes;
            updateUI(); fetchNotes(); fetchLB();
        }

        async function loadEditInfo() {
            const res = await fetch(`/api/user-info/${userId}`);
            const data = await res.json();
            document.getElementById('edit-user').value = data.username;
            document.getElementById('edit-pass').value = data.password;
            document.getElementById('edit-country').value = data.country;
        }

        async function updateProfile() {
            const res = await fetch('/api/update-profile', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ userId, newUsername:document.getElementById('edit-user').value, newPassword:document.getElementById('edit-pass').value, newCountry:document.getElementById('edit-country').value })});
            if(res.ok) alert("อัปเดตเรียบร้อย!"); else alert("ล้มเหลว");
        }

        function updateUI() {
            document.getElementById('lvl-txt').innerText = level;
            document.getElementById('exp-txt').innerText = exp;
            document.getElementById('cap-txt').innerText = getCap(level);
            document.getElementById('note-txt').innerText = totalNotes;
        }

        async function submitNote() {
            const content = document.getElementById('note-input').value.trim();
            if(!content) return;
            await fetch('/api/notes/add', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId, content}) });
            totalNotes++;
            await fetch('/api/save', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId, level, exp, totalNotes}) });
            document.getElementById('note-input').value = "";
            closeModal('note-modal'); fetchNotes(); updateUI();
        }

        async function fetchNotes() {
            const res = await fetch(currentTab === 'global' ? '/api/notes/global' : `/api/notes/user/${userId}`);
            const data = await res.json();
            document.getElementById('notes-container').innerHTML = data.map(n => `
                <div class="note-card">
                    <small style="color:var(--accent)">@${n.username || 'You'}</small>
                    ${currentTab === 'user' ? `<span class="del-btn" onclick="askDelete(${n.id})">🗑️</span>` : ''}
                    <div class="note-content" id="nc-${n.id}">${n.content}</div>
                    <span class="read-more" id="rm-${n.id}" onclick="expandNote(${n.id})" style="display:none">Read More...</span>
                </div>`).join('');
            data.forEach(n => { if(document.getElementById(`nc-${n.id}`).scrollHeight > 120) document.getElementById(`rm-${n.id}`).style.display = 'block'; });
        }

        function expandNote(id) { document.getElementById(`nc-${id}`).classList.add('expanded'); document.getElementById(`rm-${id}`).style.display = 'none'; }

        function askDelete(id) {
            openModal('confirm-modal');
            document.getElementById('confirm-del-btn').onclick = async () => {
                await fetch('/api/notes/delete', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({noteId:id, userId}) });
                closeModal('confirm-modal'); fetchNotes();
            };
        }

        async function fetchLB() {
            const res = await fetch('/api/leaderboard');
            const data = await res.json();
            document.getElementById('rank-list').innerHTML = data.map((r, i) => `<div>#${i+1} ${r.username} (Lv.${r.level})</div>`).join('');
        }

        function setTab(t) { 
            currentTab = t;
            document.getElementById('tab-global').classList.toggle('active', t === 'global');
            document.getElementById('tab-user').classList.toggle('active', t === 'user');
            fetchNotes(); 
        }

        function logout() { localStorage.removeItem('userId'); location.reload(); }
        function toggleLB() { document.getElementById('leaderboard').style.display = document.getElementById('show-lb').checked ? 'block' : 'none'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        const opt = countries.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('country-up').innerHTML = opt;
        document.getElementById('edit-country').innerHTML = opt;
    </script>
</body>
</html>
