<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Cloud Farming V2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; }
        
        /* Leaderboard Style */
        #leaderboard { width: 320px; background: white; border-right: 1px solid #ddd; padding: 20px; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        .rank-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .rank-info { font-size: 14px; }
        .rank-name { font-weight: bold; display: block; }
        .rank-date { font-size: 11px; color: #999; }
        .rank-level { color: #2ecc71; font-weight: bold; }

        /* Main Content Style */
        #content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .box { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; min-width: 350px; }
        input, select { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; }
        button { background: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #219150; }
        
        /* Sidebar Style */
        .sidebar { position: fixed; top: 0; right: -350px; width: 300px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.3s; padding: 30px; z-index: 100; text-align: left; }
        .sidebar.active { right: 0; }
        .menu-btn { position: fixed; top: 20px; right: 20px; font-size: 30px; cursor: pointer; display: none; }
        #tree-display { font-size: 120px; margin: 15px; }
    </style>
</head>
<body>

    <div id="leaderboard">
        <h2 style="color: #27ae60; border-bottom: 2px solid #27ae60; padding-bottom: 10px;">🏆 อันดับโลก</h2>
        <div id="rank-list">กำลังโหลด...</div>
    </div>

    <div id="content">
        <div id="menu-icon" class="menu-btn" onclick="toggleSidebar()">☰</div>

        <div id="signin-page" class="box">
            <h1 style="margin-top:0">Sign In</h1>
            <input type="text" id="user-in" placeholder="Username">
            <input type="password" id="pass-in" placeholder="Password">
            <button onclick="auth('signin')">เข้าสู่ระบบ</button>
            <p style="font-size:13px">ยังไม่มีบัญชี? <a href="#" onclick="switchPage('signup')">สมัครที่นี่</a></p>
        </div>

        <div id="signup-page" class="box" style="display:none">
            <h1 style="margin-top:0">Sign Up</h1>
            <input type="text" id="user-up" placeholder="Username">
            <input type="password" id="pass-up" placeholder="Password">
            <select id="country-up"></select>
            <button onclick="auth('signup')" style="background:#2980b9">สร้างบัญชี</button>
            <p style="font-size:13px">มีบัญชีแล้ว? <a href="#" onclick="switchPage('signin')">ล็อกอิน</a></p>
        </div>

        <div id="game-page" class="box" style="display:none">
            <h2 id="welcome-msg" style="color:#2c3e50"></h2>
            <div id="tree-display">🌱</div>
            <p style="font-size: 20px;">เลเวล: <span id="level" style="color:#27ae60">1</span> | Exp: <span id="exp">0</span></p>
            <button onclick="clickTree()">รดน้ำต้นไม้ 💧</button>
        </div>
    </div>

    <div id="sidebar" class="sidebar">
        <h2>ตั้งค่าโปรไฟล์</h2>
        <label>Username:</label> <input type="text" id="edit-user">
        <label>Password:</label> <input type="password" id="edit-pass">
        <label>Country:</label> <select id="edit-country"></select>
        <br><br>
        <button onclick="updateProfile()" style="width:100%">บันทึกข้อมูล</button>
        <button onclick="toggleSidebar()" style="background:#95a5a6; width:100%">ยกเลิก</button>
        <hr style="margin: 20px 0;">
        <button onclick="location.reload()" style="background:#e74c3c; width:100%">Log Out</button>
    </div>

    <script>
        let currentUserId = null, exp = 0, level = 1;
        const trees = ['🌱', '🌿', '🌳', '🌲', '✨🌳✨'];
        const countryList = [
            {n: "Thailand", f: "🇹🇭"}, {n: "USA", f: "🇺🇸"}, {n: "Japan", f: "🇯🇵"},
            {n: "South Korea", f: "🇰🇷"}, {n: "UK", f: "🇬🇧"}, {n: "China", f: "🇨🇳"},
            {n: "Germany", f: "🇩🇪"}, {n: "France", f: "🇫🇷"}, {n: "Vietnam", f: "🇻🇳"},
            {n: "Singapore", f: "🇸🇬"}, {n: "Australia", f: "🇦🇺"}, {n: "Canada", f: "🇨🇦"}
        ];

        function fillSelects() {
            const htmlSignup = '<option value="">-- เลือกประเทศ --</option>' + countryList.map(c => `<option value="${c.n}">${c.f} ${c.n}</option>`).join('');
            const htmlEdit = countryList.map(c => `<option value="${c.n}">${c.f} ${c.n}</option>`).join('');
            document.getElementById('country-up').innerHTML = htmlSignup;
            document.getElementById('edit-country').innerHTML = htmlEdit;
        }

        function switchPage(page) {
            document.getElementById('signin-page').style.display = page === 'signin' ? 'block' : 'none';
            document.getElementById('signup-page').style.display = page === 'signup' ? 'block' : 'none';
        }

        async function auth(type) {
            const user = document.getElementById(type==='signin'?'user-in':'user-up').value;
            const pass = document.getElementById(type==='signin'?'pass-in':'pass-up').value;
            const country = type==='signup' ? document.getElementById('country-up').value : '-';
            
            const res = await fetch(`/api/${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, password: pass, country })
            });
            const data = await res.json();
            if (res.ok) {
                if(type === 'signin') { currentUserId = data.userId; startGame(user); }
                else { alert("สมัครสำเร็จ! กรุณาล็อกอิน"); switchPage('signin'); }
            } else alert(data.error);
        }

        async function startGame(name) {
            document.getElementById('signin-page').style.display = 'none';
            document.getElementById('game-page').style.display = 'block';
            document.getElementById('menu-icon').style.display = 'block';
            document.getElementById('welcome-msg').innerText = `สวนของ ${name}`;
            const res = await fetch(`/api/load/${currentUserId}`);
            const data = await res.json();
            level = data.level; exp = data.exp;
            updateUI(); updateLeaderboard();
        }

        async function updateLeaderboard() {
            const res = await fetch('/api/leaderboard');
            const data = await res.json();
            document.getElementById('rank-list').innerHTML = data.map((l, i) => {
                const flag = countryList.find(c => c.n === l.country)?.f || '🏳️';
                return `
                <div class="rank-item">
                    <div class="rank-info">
                        <span class="rank-name">#${i+1} ${l.username} ${flag}</span>
                        <span class="rank-date">เข้าร่วม: ${new Date(l.created_at).toLocaleDateString()}</span>
                    </div>
                    <span class="rank-level">Lv.${l.level}</span>
                </div>`;
            }).join('');
        }

        function clickTree() {
            exp += 10;
            if (exp >= 50) { exp = 0; level++; }
            updateUI(); saveGame();
        }

        function updateUI() {
            document.getElementById('level').innerText = level;
            document.getElementById('exp').innerText = exp;
            document.getElementById('tree-display').innerText = trees[Math.min(level-1, 4)];
        }

        async function saveGame() {
            await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: currentUserId, level, exp })
            });
            updateLeaderboard();
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('active');
            if(sb.classList.contains('active')) fetchInfo();
        }

        async function fetchInfo() {
            const res = await fetch(`/api/user-info/${currentUserId}`);
            const data = await res.json();
            document.getElementById('edit-user').value = data.username;
            document.getElementById('edit-pass').value = data.password;
            document.getElementById('edit-country').value = data.country;
        }

        async function updateProfile() {
            const newUser = document.getElementById('edit-user').value;
            const res = await fetch('/api/update-profile', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    userId: currentUserId,
                    newUsername: newUser,
                    newPassword: document.getElementById('edit-pass').value,
                    newCountry: document.getElementById('edit-country').value
                })
            });
            if (res.ok) {
                alert("อัปเดตแล้ว!");
                document.getElementById('welcome-msg').innerText = `สวนของ ${newUser}`;
                toggleSidebar();
                updateLeaderboard();
            } else {
                const d = await res.json(); alert(d.error);
            }
        }

        fillSelects();
        updateLeaderboard();
    </script>
</body>
</html>
