<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Record of taking Notes</title>
    <style>
        :root { --bg: #f5f6fa; --text: #2f3640; --box: #ffffff; --border: #dcdde1; --accent: #27ae60; --danger: #e74c3c; --nav-h: 60px; }
        body.dark-mode { --bg: #1e272e; --text: #d2dae2; --box: #2f3640; --border: #485460; --accent: #44bd32; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        #leaderboard { width: 320px; background: var(--box); border-right: 1px solid var(--border); padding: 15px; overflow-y: auto; display: none; }
        .lb-item { border-bottom: 1px solid var(--border); padding: 10px 0; font-size: 13px; }
        .lb-meta { font-size: 10px; color: #888; }

        #main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        .nav { width: 100%; height: var(--nav-h); background: var(--box); display: none; justify-content: center; align-items: center; border-bottom: 1px solid var(--border); z-index: 100; }
        .tab-btn { background: none; border: none; padding: 0 20px; cursor: pointer; color: var(--text); font-weight: bold; border-bottom: 4px solid transparent; height: 100%; }
        .tab-btn.active { border-bottom-color: var(--accent); color: var(--accent); }

        .sidebar { position: fixed; right: -350px; top: var(--nav-h); width: 300px; height: calc(100% - var(--nav-h)); background: var(--box); transition: 0.3s; padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 90; border-top: 1px solid var(--border); overflow-y: auto; }
        .sidebar.active { right: 0; }
        
        #notes-container { width: 90%; max-width: 800px; margin-top: 15px; overflow-y: auto; flex-grow: 1; }
        .note-card { background: var(--box); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        .note-title { font-weight: bold; font-size: 16px; color: var(--text); margin-bottom: 8px; border-bottom: 1px dashed var(--border); padding-bottom: 5px; }
        .note-content { white-space: pre-wrap; font-size: 14px; color: var(--text); }
        .note-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 12px; }
        
        .like-btn { cursor: pointer; padding: 5px 12px; border-radius: 20px; border: 1px solid #ff4757; transition: 0.2s; font-weight: bold; }
        .like-btn.liked { background: #ff4757; color: white; }
        .like-btn.unliked { color: #ff4757; background: transparent; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 200; }
        .box { background: var(--box); padding: 25px; border-radius: 12px; text-align: center; width: 400px; }
        input, select, textarea { width: 92%; padding: 10px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: inherit; }
        button { cursor: pointer; font-weight: bold; border-radius: 8px; border: none; }
    </style>
</head>
<body>

    <div id="leaderboard">
        <h3 id="txt-lb-title" style="color: var(--accent)">🏆 อันดับ</h3>
        <select id="lb-filter" onchange="fetchLB()" style="width: 100%; padding: 5px; margin-bottom: 10px;">
            <option value="overall" id="txt-lb-overall">อันดับโดยรวม</option>
            <option value="notes" id="txt-lb-notes">เน้นจำนวน Note</option>
            <option value="likes" id="txt-lb-likes">เน้นจำนวน Like</option>
        </select>
        <div id="rank-list"></div>
    </div>

    <div id="main">
        <div class="nav" id="game-nav">
            <button id="tab-global" class="tab-btn active" onclick="setTab('global')">Notes</button>
            <button id="tab-user" class="tab-btn" onclick="setTab('user')">Your Notes</button>
            <div style="position: absolute; right: 20px; display: flex; align-items: center;">
                <button onclick="toggleTheme()" style="background:#f39c12; margin-right: 5px; color:white; padding:8px;">🌓</button>
                <button id="txt-btn-write" onclick="openModal('note-modal')" style="background:#2980b9; margin-right: 15px; color:white; padding:8px 15px;">📝 เขียนโน๊ต</button>
                <div style="font-size: 24px; cursor: pointer;" onclick="toggleSide()">☰</div>
            </div>
        </div>

        <div id="auth-section">
            <div style="position: absolute; top: 20px; right: 20px;">
                <button onclick="setLang('th')">TH</button> | <button onclick="setLang('en')">EN</button>
            </div>
            <div id="login-box" class="box" style="margin-top: 100px;">
                <h2 id="txt-auth-title">Record of taking Notes</h2>
                <input type="text" id="user-in" placeholder="Username">
                <input type="password" id="pass-in" placeholder="Password">
                <button id="txt-btn-login" onclick="handleAuth('signin')" style="width:100%; padding:10px; background:var(--accent); color:white;">Sign In</button>
                <p id="txt-goto-signup" onclick="toggleAuth('signup')" style="font-size:12px; cursor:pointer; margin-top:15px;">ยังไม่มีบัญชี? สมัครที่นี่</p>
            </div>
            <div id="signup-box" class="box" style="margin-top: 100px; display:none;">
                <h2 id="txt-signup-title">สมัครสมาชิก</h2>
                <input type="text" id="user-up" placeholder="Username">
                <input type="password" id="pass-up" placeholder="Password">
                <select id="country-up"></select>
                <button id="txt-btn-signup" onclick="handleAuth('signup')" style="width:100%; padding:10px; background:var(--accent); color:white;">Sign Up</button>
                <p id="txt-goto-login" onclick="toggleAuth('signin')" style="font-size:12px; cursor:pointer; margin-top:15px;">มีบัญชีแล้ว? เข้าสู่ระบบ</p>
            </div>
        </div>

        <div id="game-section" style="display:none; width: 100%; flex-direction: column; align-items: center; height: 100%;">
            <div id="stats-bar" style="margin-top: 15px; font-weight: bold; font-size: 18px;">
                <span id="txt-stat-notes">Notes</span>: <span id="note-txt">0</span>
            </div>
            
            <select id="note-sort" onchange="fetchNotes()" style="margin-top: 10px; width: 200px; padding: 5px;">
                <option value="latest" id="txt-sort-latest">ล่าสุด</option>
                <option value="oldest" id="txt-sort-oldest">เก่าสุด</option>
                <option value="likes" id="txt-sort-likes">ไลค์เยอะสุด</option>
                <option value="random" id="txt-sort-random">สุ่ม</option>
            </select>

            <div id="notes-container"></div>
        </div>
    </div>

    <div id="side" class="sidebar">
        <div style="background: var(--bg); padding: 15px; border-radius: 10px; border: 2px solid var(--accent); margin-bottom: 20px;">
            <label style="cursor: pointer; font-weight: bold; display: flex; align-items: center;">
                <input type="checkbox" id="show-lb" onchange="toggleLB()" style="transform: scale(1.5); margin-right: 15px;"> <span id="txt-side-showlb">แสดงอันดับ</span>
            </label>
        </div>
        <div style="margin-bottom: 20px;">
            <span id="txt-side-lang">ภาษา</span>: 
            <button onclick="setLang('th')">TH</button> <button onclick="setLang('en')">EN</button>
        </div>
        <h4 id="txt-side-edit">แก้ไขโปรไฟล์</h4>
        <input type="text" id="edit-user">
        <input type="password" id="edit-pass">
        <select id="edit-country"></select>
        <button id="txt-btn-save" onclick="updateProfile()" style="width:100%; padding:10px; background:var(--accent); color:white; margin-top:10px;">บันทึกการเปลี่ยนแปลง</button>
        <button id="txt-btn-logout" onclick="logout()" style="background:var(--danger); width:100%; margin-top:10px; color:white; padding:10px;">ออกจากระบบ</button>
    </div>

    <div id="note-modal" class="modal">
        <div class="box" style="width: 500px;">
            <h3 id="txt-modal-title">New Note</h3>
            <input type="text" id="note-title-input" placeholder="Title...">
            <textarea id="note-input" rows="8" placeholder="Content..."></textarea>
            <div style="display: flex; justify-content: center; gap: 10px; margin-top: 10px;">
                <button id="txt-btn-submit" onclick="submitNote()" style="background:var(--accent); color:white; padding:10px 25px;">บันทึก</button>
                <button id="txt-btn-close" onclick="closeModal('note-modal')" style="background:var(--danger); color:white; padding:10px 25px;">ปิด</button>
            </div>
        </div>
    </div>

    <script>
        let userId = localStorage.getItem('userId'), currentTab = 'global', currentLang = 'th';
        const countries = ["Thailand 🇹🇭", "USA 🇺🇸", "Japan 🇯🇵", "Korea 🇰🇷", "China 🇨🇳"];

        const i18n = {
            th: {
                "txt-auth-title": "Record of taking Notes", "txt-btn-login": "เข้าสู่ระบบ", "txt-goto-signup": "ยังไม่มีบัญชี? สมัครที่นี่",
                "txt-signup-title": "สมัครสมาชิก", "txt-btn-signup": "สมัครสมาชิก", "txt-goto-login": "มีบัญชีแล้ว? เข้าสู่ระบบ",
                "txt-btn-write": "📝 เขียนโน๊ต", "txt-stat-notes": "จำนวนโน๊ต", "txt-sort-latest": "ล่าสุด", "txt-sort-oldest": "เก่าสุด",
                "txt-sort-likes": "ไลค์เยอะสุด", "txt-sort-random": "สุ่ม", "txt-side-showlb": "แสดงอันดับ", "txt-side-lang": "ภาษา",
                "txt-side-edit": "แก้ไขโปรไฟล์", "txt-btn-save": "บันทึกการเปลี่ยนแปลง", "txt-btn-logout": "ออกจากระบบ",
                "txt-modal-title": "เขียนโน๊ตใหม่", "txt-btn-submit": "บันทึก", "txt-btn-close": "ปิด",
                "txt-lb-title": "🏆 อันดับ", "txt-lb-overall": "อันดับโดยรวม", "txt-lb-notes": "เน้นจำนวน Note", "txt-lb-likes": "เน้นจำนวน Like",
                "msg-del": "ลบโน๊ตนี้?", "msg-save": "อัปเดตเรียบร้อย!"
            },
            en: {
                "txt-auth-title": "Record of taking Notes", "txt-btn-login": "Sign In", "txt-goto-signup": "No account? Sign up here",
                "txt-signup-title": "Create Account", "txt-btn-signup": "Sign Up", "txt-goto-login": "Have account? Sign in",
                "txt-btn-write": "📝 Write Note", "txt-stat-notes": "Notes", "txt-sort-latest": "Latest", "txt-sort-oldest": "Oldest",
                "txt-sort-likes": "Most Liked", "txt-sort-random": "Random", "txt-side-showlb": "Show Leaderboard", "txt-side-lang": "Language",
                "txt-side-edit": "Edit Profile", "txt-btn-save": "Save Changes", "txt-btn-logout": "Log Out",
                "txt-modal-title": "New Note", "txt-btn-submit": "Save", "txt-btn-close": "Close",
                "txt-lb-title": "🏆 Leaderboard", "txt-lb-overall": "Overall Rank", "txt-lb-notes": "By Notes", "txt-lb-likes": "By Likes",
                "msg-del": "Delete this note?", "msg-save": "Updated!"
            }
        };

        window.onload = () => {
            const opt = countries.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('country-up').innerHTML = opt;
            document.getElementById('edit-country').innerHTML = opt;
            setLang('th');
            if(userId) loadGame();
        };

        function setLang(lang) {
            currentLang = lang;
            for(let key in i18n[lang]) {
                const el = document.getElementById(key);
                if(el) el.innerText = i18n[lang][key];
            }
            if(userId) fetchNotes(); 
        }

        async function loadGame() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('game-nav').style.display = 'flex';
            document.getElementById('game-section').style.display = 'flex';
            await updateStats();
            fetchNotes();
            fetchLB();
        }

        async function updateStats() {
            const res = await fetch(`/api/load-stats/${userId}`);
            const data = await res.json();
            document.getElementById('note-txt').innerText = data.total_notes;
        }

        async function fetchNotes() {
            const sort = document.getElementById('note-sort').value;
            const res = await fetch(`/api/notes?type=${currentTab}&userId=${userId}&sort=${sort}`);
            const data = await res.json();
            document.getElementById('notes-container').innerHTML = data.map(n => `
                <div class="note-card">
                    <div style="font-size:11px; color:var(--accent); font-weight:bold;">@${n.username}</div>
                    ${n.title ? `<div class="note-title">${n.title}</div>` : ''}
                    <div class="note-content">${n.content}</div>
                    <div class="note-footer">
                        <span class="like-btn ${n.isLiked ? 'liked' : 'unliked'}" onclick="likeNote(${n.id})">❤️ ${n.likes}</span>
                        ${currentTab === 'user' ? `<span style="color:var(--danger); cursor:pointer" onclick="deleteNote(${n.id})">🗑️</span>` : ''}
                    </div>
                </div>`).join('');
        }

        async function submitNote() {
            const title = document.getElementById('note-title-input').value.trim();
            const content = document.getElementById('note-input').value.trim();
            if(!content) return;
            await fetch('/api/notes/add', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({userId, title, content}) });
            document.getElementById('note-title-input').value = "";
            document.getElementById('note-input').value = "";
            closeModal('note-modal');
            await updateStats();
            fetchNotes();
        }

        async function deleteNote(id) {
            if(confirm(i18n[currentLang]["msg-del"])) {
                await fetch('/api/notes/delete', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({noteId: id, userId}) });
                await updateStats();
                fetchNotes();
            }
        }

        async function likeNote(id) {
            await fetch('/api/notes/like', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({noteId: id, userId}) });
            fetchNotes();
        }

        async function fetchLB() {
            const f = document.getElementById('lb-filter').value;
            const res = await fetch(`/api/leaderboard?filter=${f}`);
            const data = await res.json();
            document.getElementById('rank-list').innerHTML = data.map((r, i) => `
                <div class="lb-item">
                    <b>#${i+1} ${r.username}</b><br>
                    <div class="lb-meta">${r.country} | 📝 ${r.notes_count} | ❤️ ${r.total_likes}</div>
                </div>`).join('');
        }

        // --- Other functions (Theme, Auth toggle, Sidebar, etc.) ---
        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
        function toggleAuth(p) { document.getElementById('login-box').style.display = p === 'signin' ? 'block' : 'none'; document.getElementById('signup-box').style.display = p === 'signup' ? 'block' : 'none'; }
        async function handleAuth(type) {
            const u = document.getElementById(type === 'signin' ? 'user-in' : 'user-up').value;
            const p = document.getElementById(type === 'signin' ? 'pass-in' : 'pass-up').value;
            const c = type === 'signup' ? document.getElementById('country-up').value : '';
            const res = await fetch(`/api/${type}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username:u, password:p, country:c}) });
            if (res.ok) { if(type === 'signin') { userId = (await res.json()).userId; localStorage.setItem('userId', userId); loadGame(); } else toggleAuth('signin'); }
        }
        function toggleSide() { document.getElementById('side').classList.toggle('active'); if(document.getElementById('side').classList.contains('active')) loadEditInfo(); }
        async function loadEditInfo() { const res = await fetch(`/api/user-info/${userId}`); const d = await res.json(); document.getElementById('edit-user').value = d.username; document.getElementById('edit-pass').value = d.password; document.getElementById('edit-country').value = d.country; }
        async function updateProfile() { await fetch('/api/update-profile', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({userId, newUsername: document.getElementById('edit-user').value, newPassword: document.getElementById('edit-pass').value, newCountry: document.getElementById('edit-country').value}) }); alert(i18n[currentLang]["msg-save"]); }
        function setTab(t) { currentTab = t; document.getElementById('tab-global').className = t === 'global' ? 'tab-btn active' : 'tab-btn'; document.getElementById('tab-user').className = t === 'user' ? 'tab-btn active' : 'tab-btn'; fetchNotes(); }
        function logout() { localStorage.removeItem('userId'); location.reload(); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function toggleLB() { document.getElementById('leaderboard').style.display = document.getElementById('show-lb').checked ? 'block' : 'none'; if(document.getElementById('show-lb').checked) fetchLB(); }
    </script>
</body>
</html>
