<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Cloud Farming Game</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #eef2f5; padding-top: 50px; margin: 0; }
        .game-container { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); min-width: 320px; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { opacity: 0.8; }
        #tree-display { font-size: 80px; margin: 20px; }

        /* ปุ่ม Setting ขวาบน */
        .menu-btn { position: fixed; top: 20px; right: 20px; font-size: 30px; cursor: pointer; display: none; z-index: 100; }
        
        /* Sidebar สไลด์จากขวา */
        .sidebar { position: fixed; top: 0; right: -350px; width: 280px; height: 100%; background: white; box-shadow: -3px 0 10px rgba(0,0,0,0.1); transition: 0.3s; padding: 25px; text-align: left; z-index: 101; }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 99; }
    </style>
</head>
<body>

    <div id="menu-icon" class="menu-btn" onclick="toggleSidebar()">☰</div>

    <div id="auth-section" class="game-container">
        <h2>Farming Cloud</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <select id="country">
            <option value="">-- เลือกประเทศ --</option>
            <option value="Thailand">Thailand</option>
            <option value="Japan">Japan</option>
            <option value="USA">USA</option>
        </select><br>
        <button onclick="handleAuth('signin')">เข้าสู่ระบบ</button>
        <button onclick="handleAuth('signup')" style="background:#007bff">สมัครสมาชิก</button>
    </div>

    <div id="game-section" class="game-container" style="display:none">
        <h3 id="welcome-msg"></h3>
        <div id="tree-display">🌱</div>
        <p>เลเวล: <span id="level">1</span> | Exp: <span id="exp">0</span></p>
        <button onclick="clickTree()">รดน้ำต้นไม้ 💧</button>
    </div>

    <div id="sidebar" class="sidebar">
        <h3>การตั้งค่าโปรไฟล์</h3>
        <label>ชื่อผู้ใช้:</label> <input type="text" id="edit-user">
        <label>รหัสผ่าน:</label> <input type="password" id="edit-pass">
        <label>ประเทศ:</label>
        <select id="edit-country">
            <option value="Thailand">Thailand</option>
            <option value="Japan">Japan</option>
            <option value="USA">USA</option>
        </select><br><br>
        <button onclick="updateProfile()">ยืนยันแก้ไข</button>
        <button onclick="toggleSidebar()" style="background:#6c757d">ยกเลิก</button>
        <hr>
        <button onclick="location.reload()" style="background:#dc3545; width:100%">Log Out</button>
    </div>
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <script>
        let currentUserId = null, exp = 0, level = 1;
        const trees = ['🌱', '🌿', '🌳', '🌲', '✨🌳✨'];
        const pattern = /^[a-zA-Z0-9-_]+$/;

        async function handleAuth(type) {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const country = document.getElementById('country').value;

            if (!user || !pass || (type==='signup' && !country)) return alert("กรุณากรอกข้อมูลให้ครบ");
            if (!pattern.test(user) || !pattern.test(pass)) return alert("ห้ามใช้ภาษาไทย/เว้นวรรค/อักขระพิเศษ");

            const res = await fetch(`/api/${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, password: pass, country })
            });
            const data = await res.json();
            if (res.ok) {
                if (type === 'signin') { currentUserId = data.userId; showGame(user); }
                else alert("สมัครสำเร็จ! กดเข้าสู่ระบบได้เลย");
            } else alert(data.error);
        }

        async function showGame(name) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('game-section').style.display = 'block';
            document.getElementById('menu-icon').style.display = 'block'; // แสดงปุ่ม ☰
            document.getElementById('welcome-msg').innerText = `สวนของ ${name}`;
            
            const res = await fetch(`/api/load/${currentUserId}`);
            const data = await res.json();
            level = data.level; exp = data.exp;
            updateUI();
        }

        function clickTree() {
            exp += 10;
            if (exp >= 50) { exp = 0; level++; }
            updateUI();
            saveData();
        }

        function updateUI() {
            document.getElementById('level').innerText = level;
            document.getElementById('exp').innerText = exp;
            document.getElementById('tree-display').innerText = trees[Math.min(level-1, 4)];
        }

        async function saveData() {
            await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: currentUserId, level, exp })
            });
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.classList.toggle('active');
            ov.style.display = sb.classList.contains('active') ? 'block' : 'none';
            if(sb.classList.contains('active')) loadSettings();
        }

        async function loadSettings() {
            const res = await fetch(`/api/user-info/${currentUserId}`);
            const data = await res.json();
            document.getElementById('edit-user').value = data.username;
            document.getElementById('edit-pass').value = data.password;
            document.getElementById('edit-country').value = data.country;
        }

        async function updateProfile() {
            const newUsername = document.getElementById('edit-user').value;
            const newPassword = document.getElementById('edit-pass').value;
            const newCountry = document.getElementById('edit-country').value;
            
            const res = await fetch('/api/update-profile', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: currentUserId, newUsername, newPassword, newCountry })
            });
            if (res.ok) { alert("แก้ไขเรียบร้อย!"); location.reload(); }
            else { const d = await res.json(); alert(d.error); }
        }
    </script>
</body>
</html>
